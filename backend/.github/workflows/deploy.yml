name: Deploy to Aliyun ECS

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Deploy to ECS via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.ECS_HOST }}
        username: ${{ secrets.ECS_USER }}
        password: ${{ secrets.ECS_PASS }}
        port: 22
        command_timeout: 50m
        script: |
          mkdir -p /opt/pdf-parser-api
          cd /opt/pdf-parser-api
          if [ -d ".git" ]; then
            git pull origin master || git pull origin main
          else
            git clone https://github.com/Baymaxxx/pdf-parser-api.git .
          fi
          docker stop pdf-parser-api 2>/dev/null || true
          docker rm pdf-parser-api 2>/dev/null || true
          docker build -t pdf-parser-api:latest .
          docker run -d --name pdf-parser-api --restart unless-stopped -p 5000:5000 pdf-parser-api:latest
          sleep 5
          docker ps | grep pdf-parser-api
          echo "Deploy done! http://101.37.127.57:5000"
